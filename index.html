<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد اختبارات القرآن الكريم</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A054;
            --gold-light: #E8C97A;
            --gold-dark: #AE8914;
            --emerald: #1A4A3A;
            --emerald-mid: #236349;
            --emerald-light: #2E7D5A;
            --cream: #F5E0D6;
            --cream-dark: #E6D0B8;
            --ink: #1A120B;
            --ink-mid: #2D2010;
            --parchment: #FAF3E3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--parchment);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* الخلفية الإسلامية المزخرفة */
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(201,160,84,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(26,74,58,0.07) 0%, transparent 60%),
                repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(201,160,84,0.03) 40px, rgba(201,160,84,0.03) 41px);
        }

        nav {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 5%;
            background: rgba(26,74,58,0.98);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--gold-light);
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            font-weight: bold;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* شاشات التحكم والتهيئة */
        .card {
            background: rgba(26,74,58,0.95);
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            color: var(--cream);
        }

        h2 {
            font-family: 'Amiri', serif;
            color: var(--gold-light);
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2rem;
            border-bottom: 2px dashed var(--gold-mid);
            padding-bottom: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 35px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            color: var(--gold-light);
            font-weight: 600;
            font-size: 1.05rem;
        }

        select, input {
            padding: 14px;
            background: rgba(26,74,58,0.6);
            border: 1.5px solid var(--gold-dark);
            border-radius: 8px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--gold-light);
            box-shadow: 0 0 10px rgba(232,201,122,0.3);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--ink);
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(201,160,84,0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201,160,84,0.5);
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
        }

        /* شاشة عرض النماذج والطباعة */
        #resultsSection {
            display: none;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(26,74,58,0.9);
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid var(--gold);
            margin-bottom: 25px;
        }

        .btn-secondary {
            background: transparent;
            color: var(--gold-light);
            border: 1.5px solid var(--gold);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: var(--gold);
            color: var(--ink);
        }

        /* ورقة الاختبار الفخمة المعروضة للشيخ والمستعدة للطباعة */
        .model-card {
            background: white;
            color: var(--ink);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative;
        }

        .model-header {
            text-align: center;
            border-bottom: 3px double var(--gold);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .model-header h4 {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            color: var(--emerald);
        }

        .question-item {
            margin-bottom: 25px;
            font-size: 1.25rem;
            line-height: 2;
            font-family: 'Amiri', serif;
        }

        .question-text {
            font-weight: bold;
            color: var(--ink-mid);
        }

        .answer-hint {
            display: block;
            margin-top: 8px;
            font-size: 0.95rem;
            color: var(--emerald-light);
            font-family: 'Cairo', sans-serif;
            border-right: 3px solid var(--gold);
            padding-right: 10px;
        }

        /* تنسيقات الطباعة الاحترافية للـ PDF */
        @media print {
            body { background: white; color: black; }
            nav, .toolbar, .bg-pattern { display: none !important; }
            .container { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .model-card {
                border: none !important;
                box-shadow: none !important;
                padding: 0 !important;
                margin-bottom: 0 !important;
                page-break-after: always; /* كل نموذج ينزل في صفحة مستقلة مجاناً */
            }
            .answer-hint {
                color: #555 !important;
                border-right-color: #000 !important;
            }
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>

    <nav>
        <div class="nav-logo">✨ مُوَلِّدُ اخْتِبَارَاتِ الْقُرْآنِ الْكَرِيمِ</div>
    </nav>

    <div class="container">
        
        <!-- قسم الإعدادات الأولية (شاشة الشيخ الرئيسية) -->
        <section id="setupSection" class="card">
            <h2>إعداد معايير الاختبار المبارك</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>عدد النماذج المطلوبة</label>
                    <input type="number" id="modelCount" min="1" max="20" value="1">
                </div>
                <div class="form-group">
                    <label>عدد الأسئلة بكل نموذج</label>
                    <input type="number" id="questionsCount" min="1" max="10" value="3">
                </div>
                <div class="form-group">
                    <label>مستوى الصعوبة</label>
                    <select id="difficultyLevel">
                        <option value="easy">سهل (أوائل السور)</option>
                        <option value="medium" selected>متوسط (من منتصف السور)</option>
                        <option value="hard">صعب (متشابهات وآيات دقيقة)</option>
                    </select>
                </div>
            </div>
            <button class="btn" onclick="generateExams()">✨ ابدأ إنشاء النماذج الآن</button>
        </section>

        <!-- قسم النتائج والطباعة (يظهر تلقائياً بعد الضغط) -->
        <section id="resultsSection">
            <div class="toolbar">
                <button class="btn-secondary" onclick="goBack()">⬅️ تعديل الإعدادات</button>
                <button class="btn-secondary" style="background:var(--gold); color:var(--ink);" onclick="printExams()">🖨️ طباعة وحفظ كـ PDF</button>
            </div>
            
            <!-- الحاوية اللي هينزل فيها النماذج والآيات السحرية -->
            <div id="examsContainer"></div>
        </section>

    </div>

    <!-- المحرك البرمجي الذكي والمجاني بالكامل -->
    <script>
        // دالة التنقل وإخفاء شاشة البدء
        function generateExams() {
            const modelCount = document.getElementById('modelCount').value || 1;
            const questionsCount = document.getElementById('questionsCount').value || 3;
            const level = document.getElementById('difficultyLevel').value || 'medium';

            localStorage.setItem('exam_modelCount', modelCount);
            localStorage.setItem('exam_questionsCount', questionsCount);
            localStorage.setItem('exam_level', level);

            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'block';

            startGeneratingEngine();
        }

        // العودة لتعديل الخيارات
        function goBack() {
            document.getElementById('setupSection').style.display = 'block';
            document.getElementById('resultsSection').style.display = 'none';
        }

        // محرك سحب سور وآيات المصحف الشريف بالتشكيل مجاناً
        async function startGeneratingEngine() {
            const container = document.getElementById('examsContainer');
            container.innerHTML = '<p style="text-align:center; color:var(--emerald); font-size:1.3rem; font-weight:bold;">جاري استدعاء آيات الذكر الحكيم وبناء النماذج...</p>';

            try {
                // استدعاء المصحف الشريف كاملاً بالتشكيل من الـ API المجاني المعتمد في كود صاحبك
                const response = await fetch('https://cdn.jsdelivr.net/gh/fawazahmed0/quran-api@1/editions/ara-quranenc.json');
                const data = await response.json();
                const quran = data.quran; // المصفوفة الشاملة لكل الآيات[span_1](start_span)[span_1](end_span)

                const modelCount = parseInt(localStorage.getItem('exam_modelCount')) || 1;
                const questionsCount = parseInt(localStorage.getItem('exam_questionsCount')) || 3;
                const level = localStorage.getItem('exam_level') || 'medium';

                container.innerHTML = ''; // تنظيف الحاوية لبدء الرسم

                // دورة لإنشاء كل نموذج اختبار منفصل
                for (let i = 1; i <= modelCount; i++) {
                    let cardHTML = `
                        <div class="model-card">
                            <div class="model-header">
                                <h4>امتحان في حفظ القرآن الكريم</h4>
                                <p style="margin-top:5px; font-weight:600; color:#666;">النموذج رقم (${i})</p>
                            </div>
                            <ol style="padding-right: 20px;">
                    `;

                    // اختيار وتوليد الأسئلة العشوائية بناءً على الصعوبة
                    for (let j = 1; j <= questionsCount; j++) {
                        let filteredIndex;
                        
                        // تخصيص مستوى الصعوبة بذكاء مجاناً
                        if (level === 'easy') {
                            // الصعوبة السهلة: بننقي آية عشوائية تكون رقم 1 أو 2 أو 3 في السورة (بدايات السور)
                            let easyVerses = quran.filter(v => v.verse <= 3);
                            let rand = Math.floor(Math.random() * easyVerses.length);
                            filteredIndex = quran.indexOf(easyVerses[rand]);
                        } else {
                            // الصعوبة المتوسطة والعالية: اختيار عشوائي حر من المصحف كاملاً
                            filteredIndex = Math.floor(Math.random() * quran.length);
                        }

                        const targetVerse = quran[filteredIndex];
                        const words = targetVerse.text.split(' ');
                        
                        // تقطيع الآية لجعلها سؤال "أكمل"
                        let questionSnippet = '';
                        let answerSnippet = '';

                        if (words.length <= 6) {
                            // لو الآية قصيرة بنجيب أول كلمتين بس
                            questionSnippet = words.slice(0, 2).join(' ') + '...';
                            answerSnippet = words.join(' ');
                        } else {
                            // لو الآية طويلة بنجيب أول 5 كلمات والطالب يكمل
                            questionSnippet = words.slice(0, 5).join(' ') + '...';
                            answerSnippet = words.slice(5).join(' ');
                        }

                        cardHTML += `
                            <li class="question-item">
                                <span class="question-text">أكمل قوله تعالى مع ضبط اللفظ:</span> 
                                <span style="font-size: 1.4rem; color:var(--emerald);">" ${questionSnippet} "</span>
                                <span class="answer-hint">
                                    [ الموضع المعين: سورة رقم ${targetVerse.chapter} ، الآية رقم: ${targetVerse.verse} ]
                                </span>
                            </li>
                        `;
                    }

                    cardHTML += `
                            </ol>
                        </div>
                    `;
                    container.innerHTML += cardHTML;
                }

            } catch (error) {
                container.innerHTML = '<p style="text-align:center; color:red; font-weight:bold;">عذراً، حدث خطأ أثناء الاتصال بالخادم السحابي المجاني، يرجى التحقق من الإنترنت وإعادة المحاولة.</p>';
            }
        }

        // دالة فتح نافذة الطباعة وتحويل الورقة لـ PDF بضغطة زر
        function printExams() {
            window.print();
        }
    </script>
</body>
</html>
